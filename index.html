<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="AetherCore is a browser-based STL inspector with hand tracking and high fidelity WebGL rendering."
    />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>AetherCore | Touchless STL Inspector</title>
  </head>
  <body>
    <div id="app" class="app-shell">
      <main id="viewport" class="viewport" aria-label="3D viewport"></main>

      <div id="dragOverlay" class="drag-overlay" hidden>
        <span>Drop STL</span>
      </div>

      <header class="topbar">
        <div>
          <p class="eyebrow">AetherCore</p>
          <h1>Touchless STL Inspector</h1>
        </div>
        <div class="system-status" aria-live="polite">
          <span id="renderState" class="status-chip is-ready">Renderer ready</span>
          <span id="cameraState" class="status-chip">Camera idle</span>
        </div>
      </header>

      <aside class="tool-panel" aria-label="Inspector controls">
        <section class="panel-section">
          <div class="section-header">
            <span>Model</span>
            <strong id="modelName">No model</strong>
          </div>

          <input id="fileInput" type="file" accept=".stl,.STL" />
          <div class="button-stack">
            <button id="importButton" class="action-button is-primary" type="button" title="Import an STL file">
              Import STL
            </button>
            <button id="demoButton" class="action-button" type="button" title="Load the bundled demo model">
              Demo model
            </button>
            <button id="resetButton" class="action-button" type="button" title="Reset the camera and rotation">
              Reset view
            </button>
          </div>
        </section>

        <section class="panel-section">
          <div class="section-header">
            <span>Render</span>
            <strong id="triangleCount">0 triangles</strong>
          </div>

          <div class="segmented-control" role="group" aria-label="Render mode">
            <button class="is-selected" type="button" data-render-mode="hybrid">Hybrid</button>
            <button type="button" data-render-mode="particles">Points</button>
            <button type="button" data-render-mode="surface">Surface</button>
          </div>

          <div class="metric-grid">
            <div>
              <span>Points</span>
              <strong id="pointCount">0</strong>
            </div>
            <div>
              <span>Zoom</span>
              <strong id="zoomValue">100%</strong>
            </div>
            <div>
              <span>Mode</span>
              <strong id="controlMode">Mouse</strong>
            </div>
            <div>
              <span>Gesture</span>
              <strong id="gestureValue">Idle</strong>
            </div>
            <div>
              <span>Size</span>
              <strong id="sizeValue">n/a</strong>
            </div>
            <div>
              <span>Surface</span>
              <strong id="surfaceValue">n/a</strong>
            </div>
            <div>
              <span>Volume</span>
              <strong id="volumeValue">n/a</strong>
            </div>
          </div>
        </section>
      </aside>

      <section class="tracking-panel" aria-label="Hand tracking">
        <video id="cameraPreview" autoplay playsinline muted></video>
        <div class="tracking-actions">
          <button id="handToggle" class="icon-button" type="button" title="Enable hand tracking">
            Hand tracking
          </button>
          <button id="zoomLock" class="icon-button" type="button" aria-pressed="false" title="Lock gesture zoom">
            Zoom lock
          </button>
        </div>
        <div class="gesture-strip" aria-hidden="true">
          <span id="gestureFist">Fist</span>
          <span id="gestureOpen">Open</span>
          <span id="gesturePinch">Pinch</span>
        </div>
      </section>

      <div id="handCursor" class="hand-cursor" hidden>
        <span></span>
      </div>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
