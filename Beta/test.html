<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aether: Sterile 3D Inspector</title>
    <style>
        :root { 
            --accent: #00f3ff; 
            --click: #00ff88;
            --warning: #ff0055;
            --bg: #050508;
            --locked: #ffcc00;
        }
        
        body { 
            margin: 0; overflow: hidden; background: var(--bg); 
            font-family: 'Rajdhani', sans-serif; cursor: none; user-select: none;
        }

        /* --- UI LAYOUT --- */
        #ui-layer {
            position: absolute; inset: 0; pointer-events: none;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; z-index: 10;
        }

        header { text-align: left; pointer-events: auto; }
        h1 {
            margin: 0; font-size: 28px; font-weight: 600; letter-spacing: 6px;
            color: white; text-transform: uppercase;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
        }
        .subtitle { font-size: 12px; color: var(--accent); letter-spacing: 2px; opacity: 0.7; }
        .mode-badge {
            background: var(--warning); color: black; padding: 2px 8px; 
            font-size: 10px; border-radius: 4px; font-weight: bold; margin-left: 10px;
        }

        /* HUD */
        #hud {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; align-items: flex-end;
        }

        .status-pill {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 20px; border-radius: 30px; color: rgba(255,255,255,0.4);
            font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
            transition: all 0.2s; display: flex; align-items: center; gap: 10px;
        }
        
        .status-pill.active {
            border-color: var(--accent); color: white; background: rgba(0, 243, 255, 0.1);
            transform: translateY(-5px); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        #st-lock {
            border-color: var(--locked); color: var(--locked); display: none;
        }
        #st-lock.visible { display: flex; animation: pulse 2s infinite; opacity: 1; }

        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
        
        .dot { width: 8px; height: 8px; background: currentColor; border-radius: 50%; }

        /* Video Feed */
        #video-container {
            position: absolute; top: 30px; right: 30px;
            width: 160px; height: 120px; border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1); opacity: 0.8;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #video-feed { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Cursor */
        #cursor {
            position: absolute; width: 40px; height: 40px;
            border: 2px solid var(--accent); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            transition: width 0.1s, height 0.1s; 
            box-shadow: 0 0 15px var(--accent); z-index: 999;
            display: flex; justify-content: center; align-items: center;
        }
        #cursor svg {
            position: absolute; top: 50%; left: 50%; width: 70px; height: 70px;
            transform: translate(-50%, -50%) rotate(-90deg); opacity: 0; transition: opacity 0.2s;
            pointer-events: none;
        }
        #cursor circle {
            fill: none; stroke: var(--locked); stroke-width: 4;
            stroke-dasharray: 201; stroke-dashoffset: 201; 
            transition: stroke-dashoffset 0.05s linear; stroke-linecap: round;
        }
        #cursor::after { content: ''; width: 4px; height: 4px; background: white; border-radius: 50%; }
        #cursor.fist { width: 10px; height: 10px; background: var(--warning); border-color: var(--warning); }
        #cursor.open { border-style: dashed; width: 60px; height: 60px; animation: spin 4s linear infinite; }
        #cursor.hover { border-color: var(--click); background: rgba(0, 255, 136, 0.2); width: 50px; height: 50px; }
        #cursor.locked { border-color: var(--locked); box-shadow: 0 0 15px var(--locked); } 
        #cursor.pinching { border-color: var(--locked); width: 25px; height: 25px; } 
        @keyframes spin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* Controls */
        #shape-controls {
            pointer-events: auto; position: absolute; left: 30px; bottom: 100px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .btn {
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: var(--accent);
            padding: 14px 24px; font-family: 'Rajdhani', sans-serif; font-weight: 700;
            cursor: pointer; text-align: left; transition: all 0.2s; text-transform: uppercase;
            font-size: 14px; letter-spacing: 2px; width: 220px; border-radius: 6px;
        }
        .btn:hover, .btn.force-hover { 
            background: white; color: black; box-shadow: 0 0 20px white; border-color: white; transform: scale(1.05);
        }
        .btn.active { background: var(--accent); color: black; box-shadow: 0 0 15px var(--accent); border-color: var(--accent); }
        
        /* Highlight the upload button */
        #btn-upload {
            border-color: var(--click); color: var(--click);
        }
        #btn-upload.force-hover {
            background: var(--click); color: black; box-shadow: 0 0 20px var(--click);
        }

        #file-input { display: none; }

        #loader {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center; flex-direction: column;
            color: var(--accent); font-family: monospace; letter-spacing: 2px;
        }
        
        /* Drag Overlay */
        #drag-overlay {
            position: fixed; inset: 0; background: rgba(0, 243, 255, 0.1); z-index: 50;
            border: 4px dashed var(--accent); display: none; pointer-events: none;
            justify-content: center; align-items: center; font-size: 30px; color: white;
            text-shadow: 0 0 20px var(--accent); letter-spacing: 5px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

<div id="loader">
    <div>INITIALIZING AETHER INSPECTOR...</div>
    <div style="font-size: 10px; opacity: 0.6; margin-top: 10px;">Camera Access Required for Touchless Control</div>
</div>

<div id="drag-overlay">DROP FILE TO ANALYZE</div>

<div id="cursor"><svg viewBox="0 0 70 70"><circle cx="35" cy="35" r="32"></circle></svg></div>

<div id="video-container"><video id="video-feed" autoplay playsinline muted></video></div>

<input type="file" id="file-input" accept=".stl">

<div id="ui-layer">
    <header>
        <h1>Aether Inspector <span class="mode-badge">STERILE MODE</span></h1>
        <div class="subtitle">TOUCHLESS CAD VISUALIZER</div>
    </header>

    <div id="shape-controls">
        <button class="btn" id="btn-upload" onclick="triggerUpload()">&#8682; IMPORT STL FILE</button>
        <button class="btn active" id="btn-demo" onclick="loadDemoPart()">LOAD DEMO PART</button>
        <button class="btn" id="btn-reset" onclick="resetView()">RESET VIEW</button>
        
        <div style="font-size:10px; color:white; opacity:0.5; margin-top:10px; padding-left:5px;">
            GESTURES:<br>
            • FIST: ROTATE<br>
            • OPEN: ZOOM<br>
            • PINCH: LOCK/CLICK
        </div>
    </div>

    <div id="hud">
        <div id="st-zoom-out" class="status-pill"><div class="dot"></div>Zoom Out</div>
        <div id="st-lock" class="status-pill visible"><div class="dot"></div>LOCKED</div>
        <div id="st-zoom-in" class="status-pill"><div class="dot"></div>Zoom In</div>
    </div>
</div>

<script type="importmap">
    { "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@mediapipe/tasks-vision": "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"
    }}
</script>

<script type="module">
    import * as THREE from 'three';
    import { STLLoader } from 'three/addons/loaders/STLLoader.js';
    import { FilesetResolver, HandLandmarker } from '@mediapipe/tasks-vision';

    // --- CONFIGURATION ---
    const CONFIG = {
        particleCount: 50000,
        color: new THREE.Color('#00f3ff'),
        dragSensitivity: 2.5,
        friction: 0.92,
        zoomSpeed: 0.08,
        minZoom: 5,
        maxZoom: 100,
        smoothing: 0.15 
    };

    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x050508, 0.02);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 40;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // --- PARTICLES ---
    const geometry = new THREE.BufferGeometry();
    const pos = new Float32Array(CONFIG.particleCount * 3);
    const target = new Float32Array(CONFIG.particleCount * 3);
    const randoms = new Float32Array(CONFIG.particleCount);

    for (let i = 0; i < CONFIG.particleCount; i++) {
        randoms[i] = Math.random();
        // Init positions (sphere)
        const r = 15;
        const u = Math.random(), v = Math.random();
        const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
        pos[i*3] = r * Math.sin(phi) * Math.cos(theta);
        pos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        pos[i*3+2] = r * Math.cos(phi);
        target[i*3] = pos[i*3]; target[i*3+1] = pos[i*3+1]; target[i*3+2] = pos[i*3+2];
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    geometry.setAttribute('target', new THREE.BufferAttribute(target, 3));
    geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));

    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uColor: { value: CONFIG.color },
            uMix: { value: 0.0 }
        },
        vertexShader: `
            uniform float uTime;
            uniform float uMix;
            attribute float aRandom;
            attribute vec3 target;
            varying float vAlpha;
            void main() {
                vec3 mixedPos = mix(position, target, uMix);
                float noise = sin(uTime * 1.0 + mixedPos.y * 0.1) * 0.1 * aRandom;
                vec3 finalPos = mixedPos + (normalize(mixedPos) * noise);
                vec4 mvPosition = modelViewMatrix * vec4(finalPos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                gl_PointSize = (2.0) * (40.0 / -mvPosition.z);
                vAlpha = smoothstep(60.0, 10.0, length(mvPosition.xyz));
            }
        `,
        fragmentShader: `
            uniform vec3 uColor;
            varying float vAlpha;
            void main() {
                float r = distance(gl_PointCoord, vec2(0.5));
                if (r > 0.5) discard;
                gl_FragColor = vec4(uColor, (1.0 - r*2.0) * vAlpha * 0.8);
            }
        `,
        transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- FILE LOADING LOGIC ---
    const loader = new STLLoader();

    function sampleGeometry(geo) {
        geo.computeBoundingBox();
        const center = new THREE.Vector3();
        geo.boundingBox.getCenter(center);
        geo.translate(-center.x, -center.y, -center.z);

        const size = new THREE.Vector3();
        geo.boundingBox.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const scale = 25 / maxDim;
        geo.scale(scale, scale, scale);

        const posAttribute = geo.attributes.position;
        const vertexCount = posAttribute.count;
        const tArr = geometry.attributes.target.array;

        for(let i=0; i < CONFIG.particleCount; i++) {
            const vertIndex = Math.floor(Math.random() * vertexCount);
            tArr[i*3] = posAttribute.getX(vertIndex);
            tArr[i*3+1] = posAttribute.getY(vertIndex);
            tArr[i*3+2] = posAttribute.getZ(vertIndex);
        }

        morphToTarget();
    }

    let morphProgress = 1;
    function morphToTarget() {
        geometry.attributes.target.needsUpdate = true;
        material.uniforms.uMix.value = 0; 
        morphProgress = 0;
    }

    // EXPORTED FUNCTIONS FOR HTML
    window.loadDemoPart = () => {
        const torusGeo = new THREE.TorusKnotGeometry(10, 3, 100, 16);
        sampleGeometry(torusGeo);
        document.getElementById('btn-upload').classList.remove('active');
        document.getElementById('btn-demo').classList.add('active');
    };

    window.resetView = () => {
        physics.currentZoom = 40;
        physics.targetZoom = 40;
        physics.rotVelX = 0;
        physics.rotVelY = 0;
        particles.rotation.set(0,0,0);
    };
    
    // --- UPLOAD HANDLERS ---
    window.triggerUpload = () => {
        document.getElementById('file-input').click();
    };
    
    document.getElementById('file-input').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const geo = loader.parse(event.target.result);
                    sampleGeometry(geo);
                    document.getElementById('btn-demo').classList.remove('active');
                    document.getElementById('btn-upload').classList.add('active');
                } catch(err) {
                    alert("Error: Please select a valid STL file.");
                }
            };
            reader.readAsArrayBuffer(file);
        }
    });

    // DRAG & DROP
    window.addEventListener('dragover', (e) => {
        e.preventDefault();
        document.getElementById('drag-overlay').style.display = 'flex';
    });
    window.addEventListener('dragleave', (e) => {
        if(e.relatedTarget === null) {
            document.getElementById('drag-overlay').style.display = 'none';
        }
    });
    window.addEventListener('drop', (e) => {
        e.preventDefault();
        document.getElementById('drag-overlay').style.display = 'none';
        const file = e.dataTransfer.files[0];
        if(file && file.name.toLowerCase().endsWith('.stl')) {
             const reader = new FileReader();
            reader.onload = function(event) {
                const geo = loader.parse(event.target.result);
                sampleGeometry(geo);
                document.getElementById('btn-demo').classList.remove('active');
                document.getElementById('btn-upload').classList.add('active');
            };
            reader.readAsArrayBuffer(file);
        }
    });


    // --- INTERACTION STATE ---
    const physics = {
        rotVelX: 0, rotVelY: 0,
        targetZoom: 40, currentZoom: 40
    };

    const input = {
        active: false,
        rawX: 0, rawY: 0,
        smoothX: 0, smoothY: 0, 
        gesture: 'NONE', 
        isHovering: false,
        hoverTarget: null,
        isZoomLocked: false
    };

    const ui = {
        fist: document.getElementById('st-zoom-out'),
        lock: document.getElementById('st-lock'),
        open: document.getElementById('st-zoom-in'),
        cursor: document.getElementById('cursor'),
        loader: document.querySelector('#cursor circle'),
        loaderSvg: document.querySelector('#cursor svg'),
        buttons: document.querySelectorAll('.btn')
    };

    const lerp = (start, end, amt) => (1 - amt) * start + amt * end;

    // --- UI HELPERS ---
    function checkHover(x, y) {
        ui.cursor.style.display = 'none';
        const elem = document.elementFromPoint(x, y);
        ui.cursor.style.display = 'flex';

        if (elem && elem.classList.contains('btn')) {
            if (input.hoverTarget !== elem) {
                if (input.hoverTarget) input.hoverTarget.classList.remove('force-hover');
                elem.classList.add('force-hover');
                input.hoverTarget = elem;
            }
            return true;
        } else {
            if (input.hoverTarget) {
                input.hoverTarget.classList.remove('force-hover');
                input.hoverTarget = null;
            }
            return false;
        }
    }

    function clickButton() {
        if (input.hoverTarget) {
            input.hoverTarget.click();
            const originalText = input.hoverTarget.innerText;
            // Visual feedback only
            if(input.hoverTarget.tagName === 'BUTTON') {
               // input.hoverTarget.innerText = "> " + input.hoverTarget.innerText;
               setTimeout(() => { if(input.hoverTarget) input.hoverTarget.innerText = originalText; }, 500);
            }
        }
    }

    function toggleZoomLock() {
        input.isZoomLocked = !input.isZoomLocked;
        updateUI(input.gesture);
    }

    function updateUI(gesture) {
        ui.fist.classList.remove('active');
        ui.open.classList.remove('active');
        ui.cursor.className = ''; 

        if (input.isZoomLocked) {
            ui.lock.style.display = 'flex';
            ui.fist.style.opacity = '0.3';
            ui.open.style.opacity = '0.3';
            ui.cursor.classList.add('locked'); 
        } else {
            ui.lock.style.display = 'none';
            ui.fist.style.opacity = '1';
            ui.open.style.opacity = '1';
        }

        if (input.isHovering) {
            ui.cursor.classList.add('hover');
            if (gesture === 'CLICK') ui.cursor.classList.add('click');
            return;
        }

        if (!input.isZoomLocked) {
            if (gesture === 'FIST') {
                ui.fist.classList.add('active');
                ui.cursor.classList.add('fist');
            } else if (gesture === 'OPEN') {
                ui.open.classList.add('active');
                ui.cursor.classList.add('open');
            }
        }
        
        if (gesture === 'PINCH_HOLD') ui.cursor.classList.add('pinching');
    }

    // --- VISION ---
    async function initVision() {
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
        const handLandmarker = await HandLandmarker.createFromOptions(vision, {
            baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
            runningMode: "VIDEO",
            numHands: 1,
            minHandDetectionConfidence: 0.6,
            minHandPresenceConfidence: 0.6,
            minTrackingConfidence: 0.6
        });
        
        const video = document.getElementById('video-feed');
        navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => {
                document.getElementById('loader').style.display = 'none';
                loadDemoPart(); 
                predict(handLandmarker, video);
            });
        });
    }

    function predict(landmarker, video) {
        if (video.currentTime > 0) {
            const result = landmarker.detectForVideo(video, performance.now());
            processHand(result);
        }
        requestAnimationFrame(() => predict(landmarker, video));
    }

    // --- GESTURE LOGIC ---
    let clickCooldown = 0;
    let pinchTimer = 0; 
    const PINCH_THRESHOLD = 30;

    function processHand(result) {
        if (clickCooldown > 0) clickCooldown--;

        if (!result.landmarks || result.landmarks.length === 0) {
            input.active = false;
            ui.cursor.style.opacity = 0;
            updateUI('NONE');
            return;
        }

        input.active = true;
        ui.cursor.style.opacity = 1;
        const hand = result.landmarks[0];

        // Smoothed Cursor
        const targetX = 1 - hand[9].x; 
        const targetY = hand[9].y;
        input.smoothX = lerp(input.smoothX, targetX, CONFIG.smoothing);
        input.smoothY = lerp(input.smoothY, targetY, CONFIG.smoothing);
        
        const screenX = input.smoothX * window.innerWidth;
        const screenY = input.smoothY * window.innerHeight;
        ui.cursor.style.transform = `translate(${screenX}px, ${screenY}px)`;

        input.isHovering = checkHover(screenX, screenY);

        const wrist = hand[0];
        const tips = [hand[4], hand[8], hand[12], hand[16], hand[20]];
        let avgDist = 0;
        tips.forEach(t => avgDist += Math.sqrt(Math.pow(t.x-wrist.x, 2) + Math.pow(t.y-wrist.y, 2)));
        avgDist /= 5;

        const pinchDist = Math.sqrt(Math.pow(hand[8].x - hand[4].x, 2) + Math.pow(hand[8].y - hand[4].y, 2));

        // Pinch Logic
        if (pinchDist < 0.05) {
            if (input.isHovering) {
                if (clickCooldown === 0) {
                    input.gesture = 'CLICK';
                    clickButton();
                    clickCooldown = 40;
                }
            } else {
                pinchTimer++;
                input.gesture = 'PINCH_HOLD';
                const progress = Math.min(pinchTimer / PINCH_THRESHOLD, 1);
                ui.loaderSvg.style.opacity = 1;
                ui.loader.style.strokeDashoffset = 201 - (201 * progress);

                if (pinchTimer > PINCH_THRESHOLD && clickCooldown === 0) {
                    toggleZoomLock();
                    clickCooldown = 50;
                    pinchTimer = 0;
                }
            }
        } else {
            pinchTimer = 0;
            ui.loaderSvg.style.opacity = 0;
            ui.loader.style.strokeDashoffset = 201;

            if (input.isHovering) {
                input.gesture = 'HOVER';
            } else {
                if (avgDist < 0.18) {
                    input.gesture = 'FIST';
                } else if (avgDist > 0.35) { 
                    input.gesture = 'OPEN';
                } else {
                    input.gesture = 'ROTATE';
                }
            }
        }
        updateUI(input.gesture);
    }

    // --- ANIMATION LOOP ---
    const clock = new THREE.Clock();
    let lastPhysX = 0;
    let lastPhysY = 0;

    function animate() {
        const dt = clock.getDelta();
        material.uniforms.uTime.value = clock.getElapsedTime();

        if (input.active && !input.isHovering) {
            const deltaX = input.smoothX - lastPhysX;
            const deltaY = input.smoothY - lastPhysY;
            lastPhysX = input.smoothX;
            lastPhysY = input.smoothY;

            if (input.gesture !== 'PINCH_HOLD' && input.gesture !== 'CLICK') {
                if (Math.abs(deltaX) > 0.001) physics.rotVelY += deltaX * CONFIG.dragSensitivity; 
                if (Math.abs(deltaY) > 0.001) physics.rotVelX += deltaY * CONFIG.dragSensitivity; 

                if (!input.isZoomLocked) {
                    if (input.gesture === 'OPEN') physics.targetZoom -= 0.5;
                    else if (input.gesture === 'FIST') physics.targetZoom += 0.5;
                }
            }
        } else {
            lastPhysX = input.smoothX;
            lastPhysY = input.smoothY;
        }

        physics.rotVelX *= CONFIG.friction;
        physics.rotVelY *= CONFIG.friction;
        physics.targetZoom = Math.max(CONFIG.minZoom, Math.min(CONFIG.maxZoom, physics.targetZoom));
        physics.currentZoom += (physics.targetZoom - physics.currentZoom) * CONFIG.zoomSpeed;

        particles.rotation.y += physics.rotVelY;
        particles.rotation.x += physics.rotVelX;
        camera.position.z = physics.currentZoom;

        if (morphProgress < 1) {
            morphProgress += dt * 0.8; 
            material.uniforms.uMix.value = 1 - Math.pow(1 - morphProgress, 3);
        }

        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    initVision();
    animate();

</script>
</body>
</html>
